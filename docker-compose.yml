services:
  api:
    build:
      context: .
    container_name: blueocean_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    env_file: .env
    networks:
      - blueocean_network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  blueocean_network:
    external: true
