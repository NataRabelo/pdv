<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ email_title or "OceanBlue" }}</title>
</head>
<body style="margin:0; padding:0; background-color:#020617; font-family:Arial, Helvetica, sans-serif; color:#e2e8f0;">
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all;">
        {{ preheader or email_title or "OceanBlue" }}
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#020617; margin:0; padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:680px; margin:0 auto;">
                    <tr>
                        <td style="padding:0 20px 18px 20px; text-align:center;">
                            <div style="display:inline-block; padding:8px 14px; border:1px solid #1e293b; border-radius:999px; background-color:#0f172a; color:#7dd3fc; font-size:12px; letter-spacing:0.14em; text-transform:uppercase;">
                                OceanBlue
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 20px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:linear-gradient(180deg, #0f172a 0%, #020617 100%); border:1px solid #1e293b; border-radius:28px; overflow:hidden;">
                                <tr>
                                    <td style="padding:36px 32px 28px 32px; background:radial-gradient(circle at top right, rgba(56, 189, 248, 0.28), rgba(15, 23, 42, 0) 44%), radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), rgba(15, 23, 42, 0) 36%), #0f172a;">
                                        {% if badge %}
                                        <div style="display:inline-block; margin-bottom:18px; padding:7px 12px; border-radius:999px; background-color:#082f49; color:#bae6fd; font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;">
                                            {{ badge }}
                                        </div>
                                        {% endif %}

                                        <div style="font-size:34px; line-height:38px; font-weight:700; color:#f8fafc; margin-bottom:10px;">
                                            {{ email_title }}
                                        </div>

                                        {% if email_subtitle %}
                                        <div style="font-size:16px; line-height:25px; color:#94a3b8;">
                                            {{ email_subtitle }}
                                        </div>
                                        {% endif %}
                                    </td>
                                </tr>

                                {% block content %}{% endblock %}

                                <tr>
                                    <td style="padding:0 32px 32px 32px;">
                                        <div style="border-top:1px solid #1e293b; padding-top:20px; font-size:12px; line-height:20px; color:#64748b;">
                                            {{ footer_note or "Mensagem enviada pelo sistema OceanBlue." }}
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
