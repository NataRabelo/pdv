<div id="modal-edicao" class="modal-overlay">
    <div class="modal-content p-8">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white">Editar Categoria</h3>
            <button onclick="closeModal('modal-edicao')" class="text-slate-500 hover:text-white"><i
                    data-lucide="x"></i></button>
        </div>

        <form id="form-edicao" action="#" method="POST" class="space-y-4" >
            <input type="text" id="edit-id" name="edit-id" hidden> 
            <div>
                <label class="input-label">Nome</label>
                <input type="text" id="edit-nome" name="edit-nome" class="input-field" placeholder="Ex: Pincel">
            </div>
            <div>
                <label class="input-label">Descrição</label>
                <textarea class="input-field h-24 resize-none" id="edit-descricao" name="edit-descricao" placeholder="Breve resumo da categoria..."></textarea>
            </div>
            <div class="flex gap-3 mt-8">
                <button type="button" onclick="closeModal('modal-cadastro')"
                    class="flex-1 py-3 text-slate-400 font-semibold hover:bg-white/5 rounded-xl transition-all">Cancelar</button>
                <button type="submit" class="btn-submit flex-1">Salvar Categoria</button>
            </div>
        </form>
    </div>
</div>
