<div id="modal-deletar" class="modal-overlay hidden">
    <div class="modal-content p-8 max-w-md w-full">
        
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white">Confirmar Exclusão</h3>
            <button onclick="closeModal('modal-deletar')" class="text-slate-500 hover:text-white">
                <i data-lucide="x"></i>
            </button>
        </div>

        <p class="text-slate-400 mb-6">
            Tem certeza que deseja excluir esta categoria? Essa ação não pode ser desfeita.
        </p>

        <form id="form-delete">
            <input type="hidden" id="delete-id">

            <div class="flex gap-3">
                <button type="button"
                        onclick="closeModal('modal-deletar')"
                        class="flex-1 py-3 text-slate-400 font-semibold hover:bg-white/5 rounded-xl transition-all">
                    Cancelar
                </button>

                <button type="submit"
                        class="flex-1 py-3 bg-rose-500 hover:bg-rose-600 text-white font-semibold rounded-xl transition-all">
                    Deletar
                </button>
            </div>
        </form>

    </div>
</div>
