<div
    id="modal-cadastrar-produto"
    class="hidden fixed inset-0 z-[9999] items-center justify-center bg-slate-950/70 backdrop-blur-sm px-4 py-6"
>
    <div class="relative w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl border border-white/10 bg-slate-900 shadow-2xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white">Cadastrar Produto</h3>
            <button
                type="button"
                onclick="closeModal('modal-cadastrar-produto')"
                class="text-slate-400 hover:text-white transition-all"
            >
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form id="form-cadastrar-produto" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="input-label">Nome</label>
                    <input type="text" id="nome" name="nome" class="input-field" required>
                </div>

                <div>
                    <label class="input-label">Categoria</label>
                    <select id="categoria_id" name="categoria_id" class="input-field">
                        <option value="">Selecione</option>
                    </select>
                </div>

                <div>
                    <label class="input-label">Empresa</label>
                    <select id="empresa_id" name="empresa_id" class="input-field" required>
                        <option value="">Selecione</option>
                    </select>
                </div>

                <div>
                    <label class="input-label">Código de Barras</label>
                    <input type="text" id="codigo_barras" name="codigo_barras" class="input-field">
                </div>

                <div>
                    <label class="input-label">Valor de Compra</label>
                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        id="valor_compra"
                        name="valor_compra"
                        class="input-field"
                        value="0"
                    >
                </div>

                <div>
                    <label class="input-label">Valor de Venda</label>
                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        id="valor_venda"
                        name="valor_venda"
                        class="input-field"
                        value="0"
                    >
                </div>

                <div>
                    <label class="input-label">Estoque Mínimo</label>
                    <input
                        type="number"
                        step="0.001"
                        min="0"
                        id="estoque_minimo"
                        name="estoque_minimo"
                        class="input-field"
                        value="0"
                    >
                </div>

                <div class="flex items-center gap-3 pt-8">
                    <input type="checkbox" id="possui_ncm" name="possui_ncm" class="h-4 w-4">
                    <label class="input-label !mb-0">Possui NCM</label>
                </div>

                <div>
                    <label class="input-label">NCM</label>
                    <input type="text" id="ncm" name="ncm" class="input-field">
                </div>

                <div class="flex items-center gap-3 pt-8">
                    <input type="checkbox" id="ativo" name="ativo" class="h-4 w-4" checked>
                    <label class="input-label !mb-0">Ativo</label>
                </div>
            </div>

            <div>
                <label class="input-label">Descrição</label>
                <textarea id="descricao" name="descricao" class="input-field h-24 resize-none"></textarea>
            </div>

            <div class="flex gap-3 mt-8">
                <button
                    type="button"
                    onclick="closeModal('modal-cadastrar-produto')"
                    class="flex-1 py-3 text-slate-400 font-semibold hover:bg-white/5 rounded-xl transition-all"
                >
                    Cancelar
                </button>

                <button type="submit" class="btn-submit flex-1">
                    Salvar Produto
                </button>
            </div>
        </form>
    </div>
</div>
