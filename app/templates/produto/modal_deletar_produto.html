<div
    id="modal-deletar-produto"
    class="hidden fixed inset-0 z-[9999] items-center justify-center bg-slate-950/70 backdrop-blur-sm px-4 py-6"
>
    <div class="relative w-full max-w-md rounded-2xl border border-white/10 bg-slate-900 shadow-2xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white">Confirmar Exclusão</h3>
            <button type="button" onclick="closeModal('modal-deletar-produto')" class="text-slate-500 hover:text-white transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <p class="text-slate-400 mb-6">
            Tem certeza que deseja excluir este produto? Essa ação não pode ser desfeita.
        </p>

        <form id="form-delete-produto">
            <input type="hidden" id="delete-id-produto">

            <div class="flex gap-3">
                <button
                    type="button"
                    onclick="closeModal('modal-deletar-produto')"
                    class="flex-1 py-3 text-slate-400 font-semibold hover:bg-white/5 rounded-xl transition-all"
                >
                    Cancelar
                </button>

                <button
                    type="submit"
                    class="flex-1 py-3 bg-rose-500 hover:bg-rose-600 text-white font-semibold rounded-xl transition-all"
                >
                    Deletar
                </button>
            </div>
        </form>
    </div>
</div>
