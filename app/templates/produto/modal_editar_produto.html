<div
    id="modal-edicao-produto"
    class="hidden fixed inset-0 z-[9999] items-center justify-center bg-slate-950/70 backdrop-blur-sm px-4 py-6"
>
    <div class="relative w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl border border-white/10 bg-slate-900 shadow-2xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white">Editar Produto</h3>
            <button type="button" onclick="closeModal('modal-edicao-produto')" class="text-slate-500 hover:text-white transition-all">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form id="form-edicao-produto" class="space-y-4">
            <input type="hidden" id="edit-id">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="input-label">Nome</label>
                    <input type="text" id="edit-nome" class="input-field" required>
                </div>

                <div>
                    <label class="input-label">Categoria</label>
                    <select id="edit-categoria_id" class="input-field">
                        <option value="">Selecione</option>
                    </select>
                </div>

                <div>
                    <label class="input-label">Empresa</label>
                    <select id="edit-empresa_id" class="input-field" required>
                        <option value="">Selecione</option>
                    </select>
                </div>

                <div>
                    <label class="input-label">Código de Barras</label>
                    <input type="text" id="edit-codigo_barras" class="input-field">
                </div>

                <div>
                    <label class="input-label">Valor de Compra</label>
                    <input type="number" step="0.01" min="0" id="edit-valor_compra" class="input-field" value="0">
                </div>

                <div>
                    <label class="input-label">Valor de Venda</label>
                    <input type="number" step="0.01" min="0" id="edit-valor_venda" class="input-field" value="0">
                </div>

                <div>
                    <label class="input-label">Estoque Mínimo</label>
                    <input type="number" step="0.001" min="0" id="edit-estoque_minimo" class="input-field" value="0">
                </div>

                <div class="flex items-center gap-3 pt-8">
                    <input type="checkbox" id="edit-possui_ncm" class="h-4 w-4">
                    <label class="input-label !mb-0">Possui NCM</label>
                </div>

                <div>
                    <label class="input-label">NCM</label>
                    <input type="text" id="edit-ncm" class="input-field">
                </div>

                <div class="flex items-center gap-3 pt-8">
                    <input type="checkbox" id="edit-ativo" class="h-4 w-4" checked>
                    <label class="input-label !mb-0">Ativo</label>
                </div>
            </div>

            <div>
                <label class="input-label">Descrição</label>
                <textarea id="edit-descricao" class="input-field h-24 resize-none"></textarea>
            </div>

            <div class="flex gap-3 mt-8">
                <button
                    type="button"
                    onclick="closeModal('modal-edicao-produto')"
                    class="flex-1 py-3 text-slate-400 font-semibold hover:bg-white/5 rounded-xl transition-all"
                >
                    Cancelar
                </button>

                <button type="submit" class="btn-submit flex-1">
                    Salvar Alterações
                </button>
            </div>
        </form>
    </div>
</div>
